<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#6366f1" />
    <title>Memory Card</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button id="clear" class="clear btn" type="button" aria-label="Clear all cards" title="Clear all cards">
      <i class="fa-solid fa-trash" aria-hidden="true"></i>
    </button>
    <h1>
      <span>Memory Card</span>
      <button id="show" class="btn btn-small" type="button">
        <i class="fa-solid fa-plus" aria-hidden="true"></i>
        <span>Add Question</span>
      </button>
    </h1>
    <div class="card-container cards" id="card-container"></div>
    <div class="navigation" role="group" aria-label="Card navigation">
      <button id="prev" class="nav-button" type="button" aria-label="Previous card">
        <i class="fa-solid fa-angle-left" aria-hidden="true"></i>
      </button>
      <p class="current" id="current" aria-live="polite"></p>
      <button id="next" class="nav-button" type="button" aria-label="Next card">
        <i class="fa-solid fa-angle-right" aria-hidden="true"></i>
      </button>
    </div>

    <div class="add-container" id="add-container" role="dialog" aria-labelledby="add-title" aria-hidden="true">
      <h3>
        <span id="add-title">Add Question</span>
        <button id="btn-hidden" class="btn-hidden" type="button" aria-label="Close">
          <i class="fa-solid fa-x" aria-hidden="true"></i>
        </button>
      </h3>
      <div class="form-group">
        <label for="question">Question</label>
        <textarea id="question" placeholder="What do you want to remember?"></textarea>
      </div>
      <div class="form-group">
        <label for="answer">Answer</label>
        <textarea id="answer" placeholder="Type the answer here..."></textarea>
      </div>
      <button id="add-card" class="btn" type="button">
        <i class="fa-solid fa-plus" aria-hidden="true"></i>
        <span>Add Question</span>
      </button>
    </div>

    <script
      src="https://kit.fontawesome.com/6fdc859bf6.js"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
